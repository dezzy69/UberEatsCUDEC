<div class="container">

    <h4 class="center">🍔 Hacer Pedido</h4>

    <div id="contenedorPlatillos" class="row"></div>

    <div class="card-panel">

        <form id="pedidoForm">

            <div class="input-field">
                <input type="text" id="nombre" required>
                <label for="nombre">Nombre</label>
            </div>

            <div class="input-field">
                <input type="text" id="direccion" required>
                <label for="direccion">Dirección</label>
            </div>

            <div class="center">
                <button type="button" id="btnUbicacion" class="btn blue">
                    <i class="material-icons left">location_on</i>
                    Obtener ubicación
                </button>
            </div>

            <br>

            <div class="input-field">
                <input type="text" id="ubicacion" readonly>
                <label for="ubicacion" class="active">
                    Ubicación GPS
                </label>
            </div>

            <div class="input-field">
                <select id="platilloSelect" required>
                    <option value="" disabled selected>
                        Selecciona un platillo
                    </option>
                </select>
                <label>Platillo</label>
            </div>

            <div class="input-field">
                <input type="number"
                       id="cantidad"
                       min="1"
                       value="1"
                       required>

                <label for="cantidad" class="active">
                    Cantidad
                </label>
            </div>

            <button type="submit"
                    class="btn red waves-effect waves-light">

                HACER PEDIDO

            </button>

        </form>

        <br>

        <p id="mensaje" class="center green-text"></p>

    </div>

</div>
