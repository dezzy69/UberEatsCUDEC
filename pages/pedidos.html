  <!-- FORMULARIO -->
  <div class="container">

    <h4 class="center">Hacer Pedido</h4>

    <div class="card-panel">

      <form id="pedidoForm">

        <!-- Nombre -->
        <div class="input-field">
          <input type="text" id="nombre" required>
          <label>Nombre</label>
        </div>

        <!-- Dirección -->
        <div class="input-field">
          <input type="text" id="direccion" required>
          <label>Dirección</label>
        </div>

        <!-- PLATILLOS DINÁMICOS -->
        <div class="input-field">
          <select id="platilloSelect" required>
            <option value="" disabled selected>Cargando platillos...</option>
          </select>
          <label>Platillo</label>
        </div>

        <!-- Cantidad -->
        <div class="input-field">
          <input type="number" id="cantidad" min="1" required>
          <label>Cantidad</label>
        </div>

        <button class="btn red">HACER PEDIDO</button>

      </form>

      <p id="mensaje" class="center green-text"></p>

    </div>
  </div>
